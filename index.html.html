<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Guess Game</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

input {
  width: 95%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 100%;
  background: #dd2a7b;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #c2185b;
}

table {
  width: 100%;
  margin-top: 10px;
}

td, th {
  padding: 6px;
}

.gold { color: gold; }
.silver { color: gray; }
.bronze { color: #cd7f32; }
</style>
</head>

<body>

<div class="card">
  <h2>🎮 เกมทายเลข</h2>

  <input id="name" placeholder="ชื่อผู้เล่น">
  <input id="guess" type="number" placeholder="เดาเลข 1-100">

  <button onclick="checkGuess()">เดา</button>

  <p id="result"></p>

  <h3>🏆 Top 5</h3>
  <table id="scoreTable"></table>
</div>

<audio id="winSound" src="https://www.soundjay.com/button/sounds/button-4.mp3"></audio>

<script>
let random = Math.floor(Math.random()*100)+1;
let attempts = 0;

window.onload = loadScores;

function checkGuess() {
  let guess = Number(document.getElementById("guess").value);
  let name = document.getElementById("name").value;

  if (!name) return alert("ใส่ชื่อก่อน");

  attempts++;

  if (guess > random) result.innerText = "📉 มากไป!";
  else if (guess < random) result.innerText = "📈 น้อยไป!";
  else {
    let score = 100 - attempts;
    result.innerText = `🎉 ${name} ได้ ${score} คะแนน`;

    document.getElementById("winSound").play();

    fetch("https://script.google.com/macros/s/AKfycbwkLaNQ1HlhqgKllCg-9p9RGAlesDw7GkNmc-gtwIdQwMFzU4MVNIJzSigHvT4urJtxwg/exec", {
      method: "POST",
      body: JSON.stringify({
        name, score, attempts,
        date: new Date().toLocaleString()
      })
    });

    saveScore(name, score);
    loadScores();

    setTimeout(()=>{
      random = Math.floor(Math.random()*100)+1;
      attempts = 0;
    },2000);
  }
}

function saveScore(name, score){
  let s = JSON.parse(localStorage.getItem("scores")||"[]");
  s.push({name,score});
  s.sort((a,b)=>b.score-a.score);
  s = s.slice(0,5);
  localStorage.setItem("scores", JSON.stringify(s));
}

function loadScores(){
  let table = document.getElementById("scoreTable");
  let s = JSON.parse(localStorage.getItem("scores")||"[]");

  table.innerHTML = "<tr><th>อันดับ</th><th>ชื่อ</th><th>คะแนน</th></tr>";

  s.forEach((p,i)=>{
    let medal = "";
    if(i==0) medal="🥇";
    else if(i==1) medal="🥈";
    else if(i==2) medal="🥉";

    table.innerHTML += `
      <tr>
        <td>${medal || (i+1)}</td>
        <td>${p.name}</td>
        <td>${p.score}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
