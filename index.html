<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎯 เกมทายเลข</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{font-family:'Kanit',sans-serif}
body{background:#1a1a2e;color:white}

.ig-btn{
background:linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}
.ig-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
}
</style>
</head>

<body class="flex flex-col items-center p-5">

<h1 class="text-3xl font-bold mb-4">🎯 เกมทายเลข</h1>

<!-- Setup -->
<div id="setup" class="ig-card p-5 rounded-xl w-full max-w-md mb-4">
<input id="name" placeholder="ชื่อผู้เล่น" class="w-full p-2 text-black rounded mb-2">
<button onclick="startGame()" class="ig-btn w-full p-2 rounded">เริ่มเกม</button>
</div>

<!-- Game -->
<div id="game" class="hidden ig-card p-5 rounded-xl w-full max-w-md">

<p>⏱ เวลา: <span id="time">60</span></p>
<p>ครั้ง: <span id="attempt">0</span>/10</p>

<input id="guess" type="number" class="w-full p-2 text-black rounded my-2">
<button onclick="guessNum()" class="ig-btn w-full p-2 rounded">ทาย</button>

<p id="hint" class="mt-2"></p>

<button onclick="restart()" class="mt-3 text-sm underline">เล่นใหม่</button>

</div>

<!-- Leaderboard -->
<div class="ig-card p-5 rounded-xl w-full max-w-md mt-5">

<h2 class="font-bold mb-2">🏆 คะแนน</h2>

<div id="board"></div>

<button onclick="clearBoard()" class="mt-3 text-red-400 text-sm">ลบคะแนน</button>

</div>

<script>

let secret,attempt,time,player,timer;

function startGame(){
player=document.getElementById('name').value;
if(!player){alert("ใส่ชื่อก่อน");return;}

document.getElementById('setup').classList.add('hidden');
document.getElementById('game').classList.remove('hidden');

restart();
}

function restart(){
secret=Math.floor(Math.random()*100)+1;
attempt=0;
time=60;

document.getElementById('attempt').innerText=0;
document.getElementById('time').innerText=time;
document.getElementById('hint').innerText="";

clearInterval(timer);

timer=setInterval(()=>{
time--;
document.getElementById('time').innerText=time;

if(time<=0){
endGame(false);
}
},1000);
}

function guessNum(){

let val=parseInt(document.getElementById('guess').value);

if(!val)return;

attempt++;
document.getElementById('attempt').innerText=attempt;

if(val===secret){
endGame(true);
}
else if(val>secret){
document.getElementById('hint').innerText="ต่ำกว่านี้";
}
else{
document.getElementById('hint').innerText="สูงกว่านี้";
}

if(attempt>=10){
endGame(false);
}

}

function endGame(win){

clearInterval(timer);

let score=win?100-(attempt*10):0;

alert(win?"🎉 ชนะ!":"😢 แพ้!");

saveScore(score);
renderBoard();
}

function saveScore(score){

let data=JSON.parse(localStorage.getItem("scores")||"[]");

data.push({
name:player,
score:score,
date:new Date().toLocaleDateString()
});

localStorage.setItem("scores",JSON.stringify(data));
}

function renderBoard(){

let data=JSON.parse(localStorage.getItem("scores")||"[]");

data.sort((a,b)=>b.score-a.score);

let html="";

data.slice(0,5).forEach((d,i)=>{
html+=`<p>${i+1}. ${d.name} - ${d.score}</p>`;
});

document.getElementById("board").innerHTML=html;
}

function clearBoard(){
localStorage.removeItem("scores");
renderBoard();
}

renderBoard();

</script>

</body>
</html>
