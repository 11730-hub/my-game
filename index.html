<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมทายเลข</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);
  display:flex;justify-content:center;align-items:center;
  height:100vh;margin:0;color:white;
}
.card {
  background: rgba(0,0,0,0.5);
  padding:20px;border-radius:15px;width:300px;text-align:center;
}
input,select,button {
  width:100%;padding:10px;margin:5px;border-radius:8px;border:none;
}
button {background:#E1306C;color:white;cursor:pointer;}
button:hover {background:#c2185b;}
</style>
</head>

<body>

<div class="card">
  <h2>🎮 เกมทายเลข</h2>

  <input id="name" placeholder="ชื่อผู้เล่น">

  <select id="level">
    <option value="50">Easy (1-50)</option>
    <option value="100" selected>Normal (1-100)</option>
    <option value="500">Hard (1-500)</option>
  </select>

  <p>⏱ เวลา: <span id="time">60</span></p>

  <input id="guess" type="number" placeholder="เดาเลข">
  <button onclick="checkGuess()">เดา</button>

  <p id="result"></p>
  <p>ครั้งที่เดา: <span id="attempts">0</span></p>

  <h3>🏆 Top 5</h3>
  <table id="scoreTable"></table>

</div>

<audio id="winSound" src="https://www.soundjay.com/button/sounds/button-4.mp3"></audio>

<script>
let random, attempts, max, timer, time=60;

function startGame(){
  max = document.getElementById("level").value;
  random = Math.floor(Math.random()*max)+1;
  attempts = 0;
  time = 60;
  document.getElementById("attempts").innerText = 0;
  document.getElementById("result").innerText="";
}

function startTimer(){
  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;
    if(time<=0){
      clearInterval(timer);
      result.innerText="⏰ หมดเวลา!";
    }
  },1000);
}

startGame();
startTimer();

function checkGuess(){
  let name = document.getElementById("name").value;
  let guess = Number(document.getElementById("guess").value);

  if(!name) return alert("ใส่ชื่อก่อน");
  if(guess<1 || guess>max) return alert("ใส่เลขให้ถูกช่วง");

  attempts++;
  document.getElementById("attempts").innerText = attempts;

  let diff = Math.abs(guess - random);

  if(guess > random){
    result.innerText = "⬇️ ต่ำลง";
  } else if(guess < random){
    result.innerText = "⬆️ สูงขึ้น";
  } else {
    clearInterval(timer);

    let score = 100 - attempts*5;

    result.innerText = `🎉 ${name} ได้ ${score} คะแนน`;
    document.getElementById("winSound").play();

    document.body.style.background="green";
    setTimeout(()=>document.body.style.background="",500);

    saveScore(name, score);
    loadScores();

    setTimeout(()=>{
      startGame();
      startTimer();
    },2000);
  }

  if(diff<=3) result.innerText += " 🔥🔥 ใกล้มาก!";
  else if(diff<=10) result.innerText += " 🔥";

  document.getElementById("guess").value="";
}

function saveScore(name, score){
  let s = JSON.parse(localStorage.getItem("scores")||"[]");
  s.push({name,score});
  s.sort((a,b)=>b.score-a.score);
  s = s.slice(0,5);
  localStorage.setItem("scores", JSON.stringify(s));
}

function loadScores(){
  let table = document.getElementById("scoreTable");
  let s = JSON.parse(localStorage.getItem("scores")||"[]");

  table.innerHTML = "<tr><th>#</th><th>ชื่อ</th><th>คะแนน</th></tr>";

  s.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.score}</td>
      </tr>
    `;
  });
}

loadScores();
</script>

</body>
</html>
