<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 เกมทายเลข</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{font-family:'Kanit',sans-serif}
body{
background:linear-gradient(135deg,#1a1a2e,#3a1c71,#d76d77);
color:white;
}
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:25px;
}
.btn{
background:linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}
</style>
</head>

<body class="flex justify-center items-center h-screen">

<div class="card w-[350px] text-center">

<h1 class="text-2xl font-bold mb-3">🎯 เกมทายเลข</h1>

<p class="text-sm text-white/60">ทายเลขระหว่าง</p>
<p class="text-2xl font-bold mb-3">1 — 100</p>

<p class="text-sm">⏱ เวลาเหลือ</p>
<p id="time" class="text-3xl font-bold mb-3">60</p>

<input id="guess" type="number" class="w-full p-2 rounded text-black mb-2">

<button onclick="guessNum()" class="btn w-full p-2 rounded mb-3">ทาย!</button>

<p id="hint" class="mb-3">💡 ลองเดาสิ!</p>

<p>ครั้งที่เดา <span id="attempt">0</span>/10</p>

<div class="w-full bg-white/20 h-2 rounded mt-2 mb-3">
<div id="bar" class="h-2 bg-gradient-to-r from-purple-500 to-yellow-400 rounded" style="width:0%"></div>
</div>

<!-- history -->
<div id="history" class="flex flex-wrap gap-2 justify-center mb-3"></div>

<!-- result -->
<div id="result" class="hidden">
<p id="resultText" class="text-xl font-bold mb-2"></p>
<button onclick="restart()" class="btn px-5 py-2 rounded">เล่นอีกครั้ง</button>
</div>

</div>

<script>

let secret=Math.floor(Math.random()*100)+1;
let attempt=0;
let time=60;
let timer;

timer=setInterval(()=>{
time--;
document.getElementById('time').innerText=time;

if(time<=0){
endGame(false);
}
},1000);

function guessNum(){

let val=parseInt(document.getElementById('guess').value);
if(!val)return;

attempt++;
document.getElementById('attempt').innerText=attempt;

// progress bar
document.getElementById('bar').style.width=(attempt*10)+"%";

// history
let span=document.createElement("span");
span.className="px-2 py-1 rounded bg-white/20 text-sm";
span.innerText=val;
document.getElementById('history').appendChild(span);

if(val===secret){
endGame(true);
}
else if(val>secret){
document.getElementById('hint').innerText="⬇️ ต่ำกว่านี้ 🔥";
}
else{
document.getElementById('hint').innerText="⬆️ สูงกว่านี้ 🔥";
}

if(attempt>=10){
endGame(false);
}
}

function endGame(win){

clearInterval(timer);

document.getElementById('result').classList.remove('hidden');

if(win){
document.getElementById('resultText').innerText="🎉 ยินดีด้วย!";
}
else{
document.getElementById('resultText').innerText="😢 แพ้! คำตอบคือ "+secret;
}
}

function restart(){
location.reload();
}

</script>

</body>
</html>
